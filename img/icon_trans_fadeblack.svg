<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Left frame (fading out to black) -->
  <rect x="2"  y="5" width="9" height="14" rx="2" fill="white" opacity="0.5"/>
  <!-- Black centre block -->
  <rect x="9"  y="5" width="6" height="14" fill="white" opacity="0.08"/>
  <!-- Right frame (fading in from black) -->
  <rect x="13" y="5" width="9" height="14" rx="2" fill="white" opacity="0.5"/>
  <!-- Vertical divider lines suggesting the black cut -->
  <line x1="11" y1="6"  x2="11" y2="18" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="13" y1="6"  x2="13" y2="18" stroke="white" stroke-width="1.2" opacity="0.6"/>
</svg>
