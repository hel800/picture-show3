<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 32 32"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded border -->
  <rect
     x="1" y="1"
     width="30" height="30"
     rx="6"
     fill="none"
     stroke="#ffffff"
     stroke-width="1.6"
     opacity="0.5" />
  <!-- Three image thumbnails; middle one is the jump target (full opacity) -->
  <rect
     x="13" y="7"
     width="12" height="4"
     rx="1"
     fill="#ffffff"
     opacity="0.3" />
  <rect
     x="15" y="14"
     width="12" height="4"
     rx="1"
     fill="#ffffff" />
  <rect
     x="13" y="21"
     width="12" height="4"
     rx="1"
     fill="#ffffff"
     opacity="0.3" />
  <!-- Arrow pointing at the selected item -->
  <path
     d="M 6,16 h 5.5"
     stroke="#ffffff"
     stroke-width="2"
     stroke-linecap="round"
     fill="none" />
  <path
     d="M 9,13.5 12.5,16 9,18.5"
     stroke="#ffffff"
     stroke-width="2"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none" />
</svg>
