<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar outline -->
  <rect x="3" y="5" width="18" height="16" rx="2"
        fill="none" stroke="white" stroke-width="2"/>
  <!-- Header bar -->
  <line x1="3" y1="10" x2="21" y2="10" stroke="white" stroke-width="2"/>
  <!-- Peg marks -->
  <line x1="8"  y1="3" x2="8"  y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="3" x2="16" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Dot grid (3 dots) -->
  <rect x="7"  y="13" width="2.5" height="2.5" rx="0.5" fill="white"/>
  <rect x="11" y="13" width="2.5" height="2.5" rx="0.5" fill="white"/>
  <rect x="15" y="13" width="2.5" height="2.5" rx="0.5" fill="white"/>
</svg>
